name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: app/backend
        run: npm ci

      - name: Check backend source syntax
        working-directory: app/backend
        run: node --check src/index.js

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build frontend
        working-directory: app/frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ivanpetkov2007/taskmanager-backend:latest
            ivanpetkov2007/taskmanager-backend:${{ github.sha }}

      - name: Build and push frontend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          tags: |
            ivanpetkov2007/taskmanager-frontend:latest
            ivanpetkov2007/taskmanager-frontend:${{ github.sha }}

      - name: Success notification placeholder
        if: success()
        run: echo "CI pipeline completed successfully"
